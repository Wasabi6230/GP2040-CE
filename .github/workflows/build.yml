name: Build GP2040-CE Wi-Fi Firmware

on:
  push:
    branches: [wifi-config]
  pull_request:
    branches: [wifi-config]
  workflow_dispatch:

env:
  BUILD_TYPE: Release
  GP2040_BOARDCONFIG: PicoW

jobs:
  call-node-workflow:
    uses: ./.github/workflows/node.js.yml

  build:
    needs: call-node-workflow
    runs-on: ubuntu-22.04

    steps:
      - name: Setup cmake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: "3.31.x"

      - name: Verify cmake
        run: cmake --version

      - name: Checkout GP2040-CE
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
          submodules: recursive

      - name: Setup GNU Arm Embedded Toolchain
        uses: carlosperate/arm-none-eabi-gcc-action@v1.11.1

      - name: Checkout pico-sdk/2.2.0
        uses: actions/checkout@v4
        with:
          repository: raspberrypi/pico-sdk
          ref: 2.2.0
          path: pico-sdk

      - name: Checkout pico-sdk submodules
        working-directory: ${{ github.workspace }}/pico-sdk
        run: git submodule update --init

      - name: Download embedded web UI artifact
        uses: actions/download-artifact@v4
        with:
          name: fsData
          path: ${{ github.workspace }}/src/wifi/

      - name: Verify embedded web UI
        run: test -f "${{ github.workspace }}/src/wifi/fsdata_custom.c"

      - name: Get core count
        id: core_count
        run: echo "count=$(nproc)" >> "$GITHUB_OUTPUT"

      - name: Configure CMake
        run: >-
          PICO_SDK_PATH=${{ github.workspace }}/pico-sdk
          GP2040_BOARDCONFIG=${{ env.GP2040_BOARDCONFIG }}
          SKIP_WEBBUILD=TRUE
          cmake -B ${{ github.workspace }}/build
          -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}

      - name: Build firmware
        run: >-
          GP2040_BOARDCONFIG=${{ env.GP2040_BOARDCONFIG }}
          cmake --build ${{ github.workspace }}/build
          --config ${{ env.BUILD_TYPE }}
          --parallel ${{ steps.core_count.outputs.count }}

      - name: Upload UF2 artifact
        uses: actions/upload-artifact@v4
        with:
          name: GP2040-CE-WiFi-UF2
          path: ${{ github.workspace }}/build/GP2040-CE_*_${{ env.GP2040_BOARDCONFIG }}.uf2
          if-no-files-found: error

      - name: Upload ELF artifact
        uses: actions/upload-artifact@v4
        with:
          name: GP2040-CE-WiFi-ELF
          path: ${{ github.workspace }}/build/GP2040-CE_*_${{ env.GP2040_BOARDCONFIG }}.elf
          if-no-files-found: error
