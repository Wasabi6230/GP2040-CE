name: Build GP2040-CE Wi-Fi Firmware

on:
  push:
    branches: [ wifi-config ]
  pull_request:
    branches: [ wifi-config ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      # 1. Checkout your repo
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      # 2. Install Python
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
        env:
          PYTHONIOENCODING: utf-8
          
      # Python Dependencies for build scripts
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install setuptools wheel protobuf grpcio grpcio-tools

      # 3. Install CMake
      - name: Install CMake
        uses: jwlawson/actions-setup-cmake@v1
        with:
          cmake-version: '3.26.4'

      - name: Install build tools
        shell: pwsh
        run: |
          choco install ninja -y
          choco install gcc-arm-embedded -y

          "C:\ProgramData\chocolatey\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

          Get-Command ninja
          Get-Command arm-none-eabi-gcc
          Get-Command arm-none-eabi-g++

      # 5. Setup Pico SDK
      - name: Clone Pico SDK
        run: git clone -b master --recurse-submodules https://github.com/raspberrypi/pico-sdk.git ${{ github.workspace }}/pico-sdk

      # Cache the Pico SDK to speed up subsequent builds
      - name: Cache Pico SDK
        uses: actions/cache@v4
        with:
          path: pico-sdk
          key: pico-sdk-${{ hashFiles('pico-sdk/**') }}
          restore-keys: pico-sdk-

      #Cache Picotool Build
      - name: Cache Picotool Build
        uses: actions/cache@v4
        with:
          path: build/_deps/picotool
          key: picotool-${{ hashFiles('pico-sdk/**') }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Clean fsdata paths before configure
        shell: pwsh
        run: |
          if (Test-Path src/wifi/fsdata.c) {
            Remove-Item src/wifi/fsdata.c -Force
          }
          if (Test-Path lib/httpd/fsdata.c) {
            Remove-Item lib/httpd/fsdata.c -Force
          }

      - name: Configure CMake
        shell: pwsh
        run: |
          if (Test-Path build) {
            Remove-Item build -Recurse -Force
          }
          New-Item -ItemType Directory -Path build
          Set-Location build

          cmake -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DPICO_BOARD=pico_w `
            -DPICO_SDK_PATH="${{ github.workspace }}/pico-sdk" `
            -DPICO_TOOLCHAIN_PATH="C:/ProgramData/chocolatey/bin" `
            -DCMAKE_MAKE_PROGRAM="C:/ProgramData/chocolatey/bin/ninja.exe" `
            -DPython3_EXECUTABLE=python `
            ..

      - name: Verify fsdata after configure
        shell: pwsh
        run: |
          if (-not (Test-Path lib/httpd/fsdata.c)) {
            throw "lib/httpd/fsdata.c was not generated"
          }
          if (Test-Path src/wifi/fsdata.c) {
            throw "src/wifi/fsdata.c should not exist"
          }

      - name: Show remaining fsdata references
        shell: pwsh
        run: |
          Get-ChildItem -Recurse -File | Select-String -Pattern 'src/wifi/fsdata.c|tools/makefsdata.py|makefsdata.py|fsdata_custom.c' | ForEach-Object {
            "$($_.Path):$($_.LineNumber): $($_.Line)"
          }

      - name: Clean and verify fsdata before build
        shell: pwsh
        run: |
          if (Test-Path src/wifi/fsdata.c) {
            Remove-Item src/wifi/fsdata.c -Force
          }
          if (-not (Test-Path lib/httpd/fsdata.c)) {
            throw "lib/httpd/fsdata.c is required before build"
          }

      # 8. Build firmware
      - name: Build Firmware
        shell: pwsh
        run: |
          cd build
          ninja

      # 9. Upload built firmware as artifact
      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: GP2040-CE-WiFi-UF2
          path: build/**/*.uf2
